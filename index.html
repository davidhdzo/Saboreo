<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Saboreo · Madrid</title>
<!-- PWA -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#ff7a1a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Saboreo" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<link rel="icon" type="image/png" href="./icon-512.png" />
<link rel="stylesheet" href="./leaflet/leaflet.css" />
<style>
  :root{
    --bg:#fff;--surface:#fff;--surface-2:#f6f7f5;--line:#e7e9e4;
    --txt:#1c2118;--txt-dim:#7a8272;
    --orange:#ff7a1a;--orange-d:#e8630a;--green:#1fae5a;--green-d:#158a45;--blue:#2f7bff;
    --danger:#e5484d;--shadow:0 12px 40px rgba(30,40,25,.14);--shadow-sm:0 4px 16px rgba(30,40,25,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;-webkit-text-size-adjust:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  #map{position:absolute;inset:0;background:#fff;z-index:1}

  .leaflet-container{background:#f4f5f2}
  .leaflet-control-zoom{border:none!important;box-shadow:var(--shadow-sm)!important}
  .leaflet-control-zoom a{background:#fff!important;color:var(--txt)!important;border:1px solid var(--line)!important;width:38px;height:38px;line-height:38px;font-size:20px}
  .leaflet-control-zoom a:hover{background:var(--surface-2)!important;color:var(--orange)!important}
  /* bajamos los botones de zoom para que no se solapen con el logo */
  .leaflet-top.leaflet-left{top:calc(84px + env(safe-area-inset-top))}
  .leaflet-control-attribution{background:rgba(255,255,255,.8)!important;color:#9aa192!important;font-size:10px}
  .leaflet-control-attribution a{color:#7a8272!important}

  /* markers */
  .pin{position:relative;width:14px;height:14px}
  .pin i{position:absolute;inset:0;border-radius:50%;background:var(--orange);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
  .pin .ring{position:absolute;inset:-5px;border-radius:50%;border:1.5px solid;animation:pulse 2.4s infinite ease-out}
  @keyframes pulse{0%{transform:scale(.7);opacity:.9}100%{transform:scale(1.9);opacity:0}}
  /* pin con el logo de Saboreo para los sitios a los que has ido */
  .pin-logo{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--green));border:2px solid #fff;box-shadow:0 0 0 2px rgba(31,174,90,.22),0 2px 7px rgba(0,0,0,.32);display:grid;place-items:center}
  .pin-logo svg{width:15px;height:15px;display:block}

  .leaflet-tooltip.lbl{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:8px;
    box-shadow:var(--shadow-sm);color:var(--txt);font-size:11px;font-weight:600;padding:3px 8px;white-space:nowrap;backdrop-filter:blur(4px)}
  .leaflet-tooltip.lbl:before{display:none}
  .leaflet-tooltip.lbl.is-saved{border-color:var(--green);color:var(--green-d)}

  /* top bar */
  .topbar{position:absolute;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:14px;padding:calc(14px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) 14px calc(18px + env(safe-area-inset-left));
    background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,0));pointer-events:none}
  .brand{pointer-events:auto;display:flex;align-items:center;gap:11px;user-select:none}
  .logo{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,var(--orange),var(--green));box-shadow:0 6px 18px rgba(255,122,26,.3)}
  .logo svg{width:21px;height:21px}
  .brand h1{font-size:19px;margin:0;font-weight:800}.brand h1 span{color:var(--orange)}
  .brand small{font-size:9.5px;letter-spacing:.28em;color:var(--txt-dim);display:block;margin-top:1px;font-weight:600}

  .search{pointer-events:auto;margin-left:auto;position:relative;width:min(360px,52vw)}
  .search input{width:100%;padding:11px 14px 11px 40px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.95);backdrop-filter:blur(10px);color:var(--txt);font-size:16px;outline:none;transition:.2s;box-shadow:var(--shadow-sm)}
  .search input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,122,26,.14)}
  .search svg{position:absolute;left:13px;top:19px;width:16px;height:16px;color:var(--txt-dim)}
  .suggest{position:absolute;top:48px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;display:none}
  .suggest.show{display:block}
  .suggest .row{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--surface-2)}
  .suggest .row:last-child{border-bottom:none}
  .suggest .row:hover,.suggest .row.on{background:var(--surface-2)}
  .suggest .row .emoji{font-size:16px}
  .suggest .row .t{flex:1;min-width:0}
  .suggest .row .t b{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .suggest .row .t small{font-size:11px;color:var(--txt-dim)}
  .suggest .row .km{font-size:11px;color:var(--orange);font-weight:600;white-space:nowrap}

  .loader{position:absolute;top:calc(74px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:600;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:30px;padding:9px 18px;font-size:12px;color:var(--txt-dim);display:flex;align-items:center;gap:9px;box-shadow:var(--shadow-sm);transition:.3s}
  .loader.hide{opacity:0;transform:translate(-50%,-10px);pointer-events:none}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hint{position:absolute;top:calc(74px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:550;background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:30px;padding:9px 18px;font-size:12.5px;color:var(--txt-dim);box-shadow:var(--shadow-sm);display:none;align-items:center;gap:8px;font-weight:500}
  .hint.show{display:flex}
  .toast{position:absolute;top:calc(74px + env(safe-area-inset-top));left:50%;transform:translate(-50%,-14px);z-index:900;background:#fff;border:1px solid var(--green);border-radius:12px;padding:11px 18px;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;font-weight:600}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .modebar{position:absolute;top:calc(74px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:600;background:rgba(255,122,26,.12);border:1px solid var(--orange);color:var(--orange-d);border-radius:30px;padding:9px 18px;font-size:12.5px;display:none;align-items:center;gap:8px;box-shadow:var(--shadow-sm);font-weight:600}
  .modebar.show{display:flex}

  /* ---- bottom floating menu ---- */
  .dock{position:absolute;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:600;display:flex;align-items:center;gap:4px;
    background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:20px;padding:7px;box-shadow:var(--shadow)}
  .dock button{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--txt-dim);
    font-size:10px;font-weight:600;padding:8px 12px;border-radius:14px;transition:.18s;min-width:56px;font-family:inherit}
  .dock button .ic{font-size:19px;line-height:1}
  .dock button:hover{background:var(--surface-2);color:var(--txt)}
  .dock button.active{background:linear-gradient(135deg,rgba(255,122,26,.15),rgba(31,174,90,.15));color:var(--orange-d)}
  .dock .sep{width:1px;height:30px;background:var(--line);margin:0 2px}
  .dock .add{background:linear-gradient(135deg,var(--orange),var(--orange-d));color:#fff}
  .dock .add:hover{color:#fff;filter:brightness(1.05)}
  .dock .add.active{background:var(--danger)}
  /* con el panel abierto ocultamos la barra inferior y sus menús: en iOS su desenfoque (backdrop-filter)
     se colaba por encima del panel pintando la mitad inferior de naranja y bloqueando los toques */
  body.panel-open .dock,body.panel-open .cuisines,body.panel-open .menupop{display:none!important}

  /* ---- selector de mapas (Saboreo), compacto dentro del dock ---- */
  .dock .mapmodes{position:relative;display:flex}
  .mode-current{display:flex;align-items:center;gap:5px;cursor:pointer;font-family:inherit;
    background:linear-gradient(135deg,var(--orange),var(--green));color:#fff;border:none;border-radius:15px;
    padding:9px 12px;box-shadow:0 4px 14px rgba(255,122,26,.3);transition:.18s}
  .mode-current:hover{filter:brightness(1.06)}
  .mode-current:active{transform:scale(.96)}
  .mode-current .mc-em{font-size:20px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))}
  .mode-current .mc-chev{font-size:11px;opacity:.9;transition:.25s;margin-top:1px}
  .mapmodes.open .mc-chev{transform:rotate(180deg)}

  .mode-pop{position:absolute;left:0;bottom:calc(100% + 12px);width:min(264px,80vw);
    background:rgba(255,255,255,.98);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);padding:8px;opacity:0;pointer-events:none;transform:translateY(12px) scale(.96);transform-origin:bottom left;transition:.22s cubic-bezier(.22,1,.36,1);z-index:10}
  .mapmodes.open .mode-pop{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
  .mode-pop .mp-head{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-dim);font-weight:800;padding:9px 12px 11px}
  .mode-pop .mp-head b{font-weight:800}.mode-pop .mp-head b span{color:var(--orange)}
  .mode-opt{display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;cursor:pointer;font-family:inherit;
    padding:11px 12px;border-radius:15px;text-align:left;transition:.14s;color:var(--txt)}
  .mode-opt:hover{background:var(--surface-2)}
  .mode-opt .mo-em{font-size:24px;line-height:1;width:36px;text-align:center;flex-shrink:0}
  .mode-opt .mo-tx{display:flex;flex-direction:column;min-width:0;gap:1px}
  .mode-opt .mo-tx b{font-size:14.5px;font-weight:700}
  .mode-opt .mo-tx small{font-size:11.5px;color:var(--txt-dim);font-weight:500}
  .mode-opt.on{background:linear-gradient(135deg,rgba(255,122,26,.15),rgba(31,174,90,.15))}
  .mode-opt.on .mo-tx b{color:var(--orange-d)}
  .mode-opt .mo-check{margin-left:auto;color:var(--green-d);font-weight:800;opacity:0;transition:.14s}
  .mode-opt.on .mo-check{opacity:1}

  /* cuisine popover */
  .cuisines{position:absolute;left:50%;bottom:calc(102px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(10px);z-index:600;
    background:rgba(255,255,255,.98);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow);
    width:min(520px,92vw);opacity:0;pointer-events:none;transition:.22s}
  .cuisines.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .cuisines h3{margin:0 0 11px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-dim)}
  .cwrap{display:flex;flex-wrap:wrap;gap:8px}
  .cuisines .c{display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 12px;cursor:pointer;font-size:12.5px;font-weight:600;transition:.16s;color:var(--txt)}
  .cuisines .c:hover{border-color:var(--cc,var(--orange))}
  .cuisines .c .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .cuisines .c.on .dot{background:#fff!important}
  .cuisines .c .em{font-size:15px}
  .cuisines .clear{margin-top:12px;width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:9px;font-size:12px;font-weight:600;color:var(--txt-dim);cursor:pointer}
  .cuisines .clear:hover{color:var(--txt)}

  /* side panel */
  .panel{position:absolute;top:0;right:0;bottom:0;width:100%;z-index:800;background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column}
  .panel:not(.open){display:none}
  .panel.open{animation:panelIn .32s cubic-bezier(.22,1,.36,1)}
  @keyframes panelIn{from{transform:translateX(100%);opacity:.5}to{transform:translateX(0);opacity:1}}
  .panel-head{padding:calc(20px + env(safe-area-inset-top)) 22px 16px;border-bottom:1px solid var(--line);position:relative;background:linear-gradient(135deg,rgba(255,122,26,.06),rgba(31,174,90,.06))}
  .panel-head .cat{font-size:10px;letter-spacing:.22em;color:var(--orange);text-transform:uppercase;font-weight:800}
  .panel-head h2{margin:8px 0 4px;font-size:22px;line-height:1.15;padding-right:40px}
  .panel-head .addr{color:var(--txt-dim);font-size:12.5px;display:flex;align-items:center;gap:6px}
  .close{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--txt-dim);cursor:pointer;font-size:15px;display:grid;place-items:center;transition:.2s}
  .close:hover{color:var(--txt);border-color:var(--orange)}
  .favstar{position:absolute;top:18px;right:58px;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:15px;display:grid;place-items:center;transition:.2s}
  .favstar.on{background:var(--orange);border-color:var(--orange);color:#fff}
  .panel-body{flex:1;position:relative;overflow:hidden;padding:0}
  .panel-body::-webkit-scrollbar{width:8px}.panel-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .section-title{font-size:11px;letter-spacing:.16em;color:var(--txt-dim);text-transform:uppercase;margin:22px 0 12px;font-weight:700}
  .dish{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:14px}
  .dish .media{position:relative;width:100%;aspect-ratio:16/10;background:#000;overflow:hidden}
  .dish .media img,.dish .media video{width:100%;height:100%;object-fit:cover;display:block}
  .dish .media .badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:#fff;font-size:10px;letter-spacing:.1em;padding:4px 9px;border-radius:20px;text-transform:uppercase;font-weight:700}
  .dish .info{padding:13px 15px}.dish .info h4{margin:0 0 4px;font-size:15px}.dish .info p{margin:0;color:var(--txt-dim);font-size:12.5px;line-height:1.5}
  .dish .info .del{margin-top:10px;background:none;border:1px solid var(--line);color:var(--txt-dim);font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;transition:.2s}
  .dish .info .del:hover{border-color:var(--danger);color:var(--danger)}
  .empty{color:var(--txt-dim);font-size:13px;text-align:center;padding:24px 10px;border:1px dashed var(--line);border-radius:12px}
  .form label{display:block;font-size:11.5px;color:var(--txt-dim);margin:0 0 6px;font-weight:600}
  .form .addcol.left label:nth-of-type(2){margin-top:12px}
  .form input[type=text],.form textarea{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:10px 12px;font-size:13px;font-family:inherit;outline:none;transition:.2s}
  .form input:focus,.form textarea:focus{border-color:var(--green)}
  .addcard{display:grid;grid-template-columns:1fr 150px;gap:14px;background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:15px}
  .addcol.left{display:flex;flex-direction:column;min-width:0}
  .addcol.left textarea{resize:none;flex:1;min-height:70px}
  .addcol.right{display:flex;flex-direction:column;min-width:0}
  .drop{flex:1;border:1.5px dashed var(--line);border-radius:12px;cursor:pointer;transition:.2s;color:var(--txt-dim);font-size:12px;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;position:relative;min-height:150px;padding:10px}
  .drop:hover{border-color:var(--green);color:var(--txt)}
  .drop.has{border-style:solid;border-color:var(--green);padding:0}
  .drop svg{width:26px;height:26px;margin-bottom:9px;opacity:.7}
  .drop .dt{line-height:1.45}
  .drop img,.drop video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .drop .redo{position:absolute;bottom:7px;right:7px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:4px 8px;border-radius:14px;backdrop-filter:blur(4px);font-weight:600}
  .save{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;transition:.2s}
  .save:hover{transform:translateY(-1px)}.save:disabled{opacity:.4;cursor:not-allowed;transform:none}
  @media(max-width:440px){.addcard{grid-template-columns:1fr}.drop{min-height:130px}}

  /* overlay modal (Mis platos / Favoritos list) */
  .overlay{position:absolute;inset:0;z-index:850;background:rgba(28,33,24,.35);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{background:#fff;width:min(560px,96vw);max-height:80vh;border-radius:22px 22px 0 0;box-shadow:var(--shadow);display:flex;flex-direction:column;animation:up .3s cubic-bezier(.22,1,.36,1)}
  @keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .sheet-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .sheet-head h3{margin:0;font-size:17px}
  .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px calc(22px + env(safe-area-inset-bottom))}
  .listitem{display:flex;align-items:center;gap:12px;padding:11px;border:1px solid var(--line);border-radius:13px;margin-bottom:10px;cursor:pointer;transition:.16s}
  .listitem:hover{border-color:var(--orange);background:var(--surface-2)}
  .listitem .thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--surface-2);flex-shrink:0;display:grid;place-items:center;font-size:20px;color:var(--txt-dim)}
  .listitem .t{flex:1;min-width:0}.listitem .t b{display:block;font-size:14px}.listitem .t small{color:var(--txt-dim);font-size:12px}

  @media(max-width:560px){.brand small{display:none}.dock button{min-width:48px;padding:7px 8px}.dock button span.lb{display:none}.dock button .ic{font-size:21px}}

  /* highlighted (searched) pin */
  .pin.hl{width:26px;height:26px;z-index:1000}
  .pin.hl i{background:var(--blue)!important;border:3px solid #fff;
    box-shadow:0 0 0 4px rgba(47,123,255,.35),0 6px 18px rgba(47,123,255,.6)!important;animation:hlbounce .6s ease}
  .pin.hl .ring{inset:-11px;border-width:3px!important;border-color:var(--blue)!important;animation:hlpulse 1.5s infinite ease-out}
  .pin.hl:after{content:"";position:absolute;inset:-11px;border-radius:50%;border:3px solid var(--blue);animation:hlpulse 1.5s .75s infinite ease-out}
  @keyframes hlpulse{0%{transform:scale(.55);opacity:.85}100%{transform:scale(2.6);opacity:0}}
  @keyframes hlbounce{0%{transform:translateY(-16px);opacity:0}60%{transform:translateY(3px)}100%{transform:translateY(0);opacity:1}}
  /* emoji markers (cuisine symbol instead of text label) */
  .em-pin{width:24px;height:24px;border-radius:50%;background:#fff;border:1.5px solid var(--line);box-shadow:0 1px 4px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1}
  .em-pin.has{border-color:var(--green);box-shadow:0 0 0 2px rgba(31,174,90,.28),0 1px 4px rgba(0,0,0,.2)}
  .em-pin.fav{border-color:var(--orange)}
  .leaflet-tooltip.lbl.is-hl{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:800;font-size:12.5px;box-shadow:0 6px 18px rgba(47,123,255,.5)}

  /* hamburger menu */
  .menubtn{pointer-events:auto;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.95);backdrop-filter:blur(10px);color:var(--txt);font-size:18px;cursor:pointer;box-shadow:var(--shadow-sm);display:grid;place-items:center;transition:.2s}
  .menubtn:hover{border-color:var(--orange);color:var(--orange)}
  .menupop{position:absolute;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:700;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:6px;width:min(240px,86vw);display:none}
  .menupop.show{display:block}

</style>

/* ============================================================
   Saboreo · Madrid — prototipo funcional
   ============================================================ */
const MADRID=[40.4168,-3.7038];
const MIN_ZOOM=15;    // por debajo: no se muestran puntos
const LABEL_ZOOM=18;  // desde aquí: aparecen los nombres solos (solo muy cerca)
const MAX_MARKERS=140;// máx puntos a la vez (fluidez)
const MAX_LABELS=32;  // máx nombres a la vez (no saturar)
const POI_MIN_ZOOM=14;// con menos zoom SOLO se ven los sitios a los que has ido; el resto aparece al acercarte
// tamaño (px) de la celda de la rejilla de pines según el zoom:
// menos zoom => celdas grandes => pocos puntos; más zoom => celdas pequeñas => van apareciendo el resto poco a poco
function pinCellPx(z){
  if(z>=19)return 48;
  if(z>=18)return 62;
  if(z>=17)return 80;
  if(z>=16)return 104;
  if(z>=15)return 134;
  return 180;          // z==14
}

const CUISINES=[
  {key:'italiana',label:'Italiana',em:'🍝',color:'#e5484d',match:['italian','pizza','pasta']},
  {key:'espanola',label:'Española',em:'🥘',color:'#eab308',match:['spanish','tapas','regional','asador','castilian','mediterranean']},
  {key:'japonesa',label:'Japonesa',em:'🍣',color:'#ec4899',match:['japanese','sushi','ramen']},
  {key:'francesa',label:'Francesa',em:'🥐',color:'#6366f1',match:['french','crepe']},
  {key:'peruana',label:'Peruana',em:'🌶️',color:'#b45309',match:['peruvian','latin']},
  {key:'griega',label:'Griega',em:'🥙',color:'#06b6d4',match:['greek']},
  {key:'india',label:'India',em:'🍛',color:'#f97316',match:['indian']},
  {key:'libanesa',label:'Libanesa',em:'🧆',color:'#14b8a6',match:['lebanese','arab','syrian']},
  {key:'estadounidense',label:'Estadounidense',em:'🍔',color:'#3b82f6',match:['american','burger','barbecue','steak']},
  {key:'china',label:'China',em:'🥡',color:'#8b5cf6',match:['chinese','asian','dumpling','wok']},
];
const CUISINE_COLOR={};CUISINES.forEach(c=>CUISINE_COLOR[c.key]=c.color);
const OTHER_COLOR='#94a3b8';   // sin tipo etiquetado
function colorForPlace(p){return CUISINE_COLOR[p.ckey]||OTHER_COLOR;}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function cuisineKey(raw){const s=(raw||'').toLowerCase();for(const c of CUISINES){for(const m of c.match){if(s.includes(m))return c.key;}}return null;}
function cuisineEmoji(key){const c=CUISINES.find(c=>c.key===key);return c?c.em:'🍴';}

/* IndexedDB */
const DB={db:null,
  open(){return new Promise((res,rej)=>{const r=indexedDB.open('saboreo',1);
    r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('places'))d.createObjectStore('places',{keyPath:'id'});};
    r.onsuccess=e=>{this.db=e.target.result;res()};r.onerror=e=>rej(e);});},
  put(o){return new Promise((res,rej)=>{const t=this.db.transaction('places','readwrite');t.objectStore('places').put(o);t.oncomplete=res;t.onerror=rej;});},
  get(id){return new Promise(res=>{const t=this.db.transaction('places','readonly');const q=t.objectStore('places').get(id);q.onsuccess=()=>res(q.result||null);q.onerror=()=>res(null);});},
  all(){return new Promise(res=>{const t=this.db.transaction('places','readonly');const q=t.objectStore('places').getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([]);});}
};

let map,markerLayer,markers=new Map(),current=null,addMode=false,pendingMedia=null,activeCuisine=null,youMarker=null,highlightId=null,pendingCourse='comida',mapMode='all';
// los 3 "mapas" de Saboreo:  all = explorar todos · eaten = donde he comido · wishlist = quiero ir
const MODE_INFO={
  all:{em:'🗺️',t:'Explorar',s:'Todos los restaurantes'},
  eaten:{em:'😋',t:'He comido aquí',s:'Los sitios que has saboreado'},
  wishlist:{em:'⭐',t:'Quiero ir',s:'Tu lista de pendientes'}
};
const saved=new Map(),known=new Map();
let PLACES=[];
const favorites=new Set(JSON.parse(localStorage.getItem('saboreo_favs')||'[]'));   // "Quiero ir"
function saveFavs(){localStorage.setItem('saboreo_favs',JSON.stringify([...favorites]));}
const visited=new Set(JSON.parse(localStorage.getItem('saboreo_visited')||'[]'));  // "He ido" (aunque no haya platos)
function saveVisited(){localStorage.setItem('saboreo_visited',JSON.stringify([...visited]));}
const ckeyOverrides=JSON.parse(localStorage.getItem('saboreo_ckey')||'{}');        // tipo de cocina asignado a mano

// aplica los tipos de cocina que hayas asignado tú a los restaurantes ya cargados
function applyCkeyOverrides(){for(const k in ckeyOverrides){let p=known.get(k);if(!p&&/^\d+$/.test(k))p=known.get(+k);if(p)p.ckey=ckeyOverrides[k]||null;}}
// logo de Saboreo (para los pines de sitios a los que has ido)
const LOGO_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v7a3 3 0 0 0 6 0V3M6 3v18M18 3c-2 0-3 2-3 5s1 4 3 4 3-1 3-4-1-5-3-5zM18 12v9"/></svg>';
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}

/* map */
function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:true,minZoom:11,maxZoom:19,preferCanvas:true}).setView([40.4155,-3.7025],15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap · © CARTO',subdomains:'abcd',maxZoom:19,keepBuffer:8,updateWhenIdle:true,updateWhenZooming:false}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
  map.on('click',onMapClick);
  map.on('moveend zoomend',scheduleRefresh);
}
let _rvTimer,_lastRefreshCenter=null,_lastRefreshZoom=null;
function scheduleRefresh(){clearTimeout(_rvTimer);_rvTimer=setTimeout(maybeRefresh,60);}
// solo recolocamos los restaurantes si el mapa se ha movido una distancia razonable en pantalla
// (así un pequeño desplazamiento no reorganiza todos los puntos). Un cambio de zoom siempre refresca.
function maybeRefresh(){
  const z=map.getZoom(),c=map.getCenter();
  if(_lastRefreshCenter!=null&&z===_lastRefreshZoom){
    const p0=map.latLngToContainerPoint(_lastRefreshCenter),p1=map.latLngToContainerPoint(c);
    const moved=Math.hypot(p1.x-p0.x,p1.y-p0.y),sz=map.getSize();
    if(moved<Math.max(130,Math.min(sz.x,sz.y)*0.45))return;   // movimiento pequeño -> no tocar los puntos
  }
  refreshVisible();
}
function makeIcon(p){
  const hl=p.id===highlightId;
  if(hl){                                                    // el buscado: pin azul destacado
    const col='#2f7bff';
    const dot=`<i style="background:${col};box-shadow:0 0 0 2px ${hexA(col,.18)},0 1px 4px rgba(0,0,0,.25)"></i>`;
    const ring=`<span class="ring" style="border-color:${hexA(col,.6)}"></span>`;
    return L.divIcon({className:'',html:`<div class="pin hl">${dot}${ring}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
  }
  if(isVisited(p.id)){                                       // sitios a los que HAS IDO: pin con el logo de Saboreo
    return L.divIcon({className:'',html:`<div class="pin-logo">${LOGO_SVG}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
  }
  const col=colorForPlace(p);                                // el resto: punto del color de su tipo de cocina
  const ring=favorites.has(p.id)?`<span class="ring" style="border-color:${hexA(col,.6)}"></span>`:'';
  const dot=`<i style="background:${col};box-shadow:0 0 0 2px ${hexA(col,.18)},0 1px 4px rgba(0,0,0,.25)"></i>`;
  return L.divIcon({className:'',html:`<div class="pin">${dot}${ring}</div>`,iconSize:[14,14],iconAnchor:[7,7]});
}
function addMarker(p,label){
  const been=isVisited(p.id);
  const m=L.marker([p.lat,p.lng],{icon:makeIcon(p),keyboard:false});
  m.on('click',e=>{L.DomEvent.stopPropagation(e);openPanel(p.id);});
  const hl=p.id===highlightId;
  if(label)m.bindTooltip(p.name,{permanent:true,interactive:true,direction:'top',className:'lbl'+(hl?' is-hl':(been?' is-saved':'')),offset:[0,hl?-16:(been?-14:-7)]});
  m.addTo(markerLayer);markers.set(p.id,m);
}
function dist2(a,c){const dx=a.lng-c.lng,dy=a.lat-c.lat;return dx*dx+dy*dy;}
function hasDishes(id){const r=saved.get(id);return !!(r&&r.dishes.length>0);}
function isVisited(id){return visited.has(id)||hasDishes(id);}   // "he ido": marcado a mano o con platos guardados
let hintWanted=false;   // el mapa "querría" mostrar el aviso de acercarse (según zoom)
// mostramos el aviso solo si no hay sugerencias de búsqueda abiertas (para que no se solapen)
function applyHint(){document.getElementById('zoomHint').classList.toggle('show',hintWanted&&!document.getElementById('suggest').classList.contains('show'));}
function refreshVisible(){
  markerLayer.clearLayers();markers.clear();
  const z=map.getZoom();
  _lastRefreshCenter=map.getCenter();_lastRefreshZoom=z;
  if(mapMode!=='all'){   // "He comido" o "Quiero ir": todos los del conjunto, a cualquier zoom
    hintWanted=false;applyHint();
    const inSet=mapMode==='eaten'?(p=>isVisited(p.id)):(p=>favorites.has(p.id));
    PLACES.filter(p=>inSet(p)&&(!activeCuisine||p.ckey===activeCuisine)).forEach(p=>addMarker(p,true));
    return;
  }
  const b=map.getBounds(),c=map.getCenter();
  const filtered=!!activeCuisine;                        // si hay filtro de cocina, mostramos esos sitios a cualquier zoom
  let vis=PLACES.filter(p=>{
    if(!b.contains([p.lat,p.lng]))return false;
    if(activeCuisine&&p.ckey!==activeCuisine)return false;
    return true;
  });
  vis.sort((a,b)=>dist2(a,c)-dist2(b,c));

  const pinW=filtered?60:pinCellPx(z);                   // rejilla de pines: su tamaño depende del zoom -> revelado progresivo
  const labW=filtered?165:210, labH=filtered?125:160;    // rejilla GRUESA de nombres: como mucho un NOMBRE por celda
  const pinCells=new Set(),labCells=new Set(),placed=[];
  // intenta colocar el nombre del sitio evitando solapes; devuelve true si cabe
  const tryLabel=(p,pt,big)=>{
    const lk=Math.floor(pt.x/labW)+'_'+Math.floor(pt.y/labH);
    if(labCells.has(lk))return false;
    const w=Math.min(big?210:190,p.name.length*(big?7:6.6)+(big?24:16));
    const box=big?{x1:pt.x-w/2-6,y1:pt.y-42,x2:pt.x+w/2+6,y2:pt.y+16}
                 :{x1:pt.x-w/2-3,y1:pt.y-31,x2:pt.x+w/2+3,y2:pt.y-7};
    if(placed.some(bx=>!(box.x2<bx.x1||box.x1>bx.x2||box.y2<bx.y1||box.y1>bx.y2)))return false;
    labCells.add(lk);placed.push(box);return true;
  };

  if(highlightId){                                       // el buscado: siempre visible con su nombre
    const p=vis.find(x=>x.id===highlightId);
    if(p){
      const pt=map.latLngToContainerPoint([p.lat,p.lng]);
      pinCells.add(Math.floor(pt.x/pinW)+'_'+Math.floor(pt.y/pinW));
      tryLabel(p,pt,true);
      addMarker(p,true);
    }
  }

  // 1) los sitios a los que HAS IDO: siempre visibles, a cualquier zoom (incluso con poco zoom)
  for(const p of vis){
    if(p.id===highlightId||!isVisited(p.id))continue;
    const pt=map.latLngToContainerPoint([p.lat,p.lng]);
    pinCells.add(Math.floor(pt.x/pinW)+'_'+Math.floor(pt.y/pinW));
    addMarker(p,tryLabel(p,pt,false));
  }

  // 2) el RESTO de restaurantes: solo con suficiente zoom; van apareciendo al acercarte
  const showRest=filtered||z>=POI_MIN_ZOOM;
  hintWanted=!showRest;applyHint();
  if(showRest){
    let shown=0;
    for(const p of vis){
      if(shown>=260)break;
      if(p.id===highlightId||isVisited(p.id))continue;
      const pt=map.latLngToContainerPoint([p.lat,p.lng]);
      const pk=Math.floor(pt.x/pinW)+'_'+Math.floor(pt.y/pinW);
      if(pinCells.has(pk))continue;                      // ya hay un pin en esa celda -> repartir por el mapa
      pinCells.add(pk);shown++;
      addMarker(p,tryLabel(p,pt,false));
    }
  }
}

/* data */
function buildPlaces(){
  (window.SABOREO_DATA||[]).forEach(d=>{
    const p={id:d.i,name:d.n,cat:d.c||'restaurante',addr:d.a||'Madrid',lat:d.y,lng:d.x,custom:false,ckey:cuisineKey(d.c)};
    known.set(p.id,p);PLACES.push(p);
  });
}

/* panel */
function openPanel(id){
  current=id;const p=known.get(id);if(!p)return;
  document.getElementById('pCat').textContent=(p.cat||'Restaurante').toUpperCase();
  document.getElementById('pName').textContent=p.name;
  document.getElementById('pAddr').textContent=p.addr||'Madrid';
  updateFavStar(id);
  clearForm();renderInfo(id);showPane('info');
  document.getElementById('panel').classList.add('open');
  document.body.classList.add('panel-open');
  closeOverlay();map.panTo([p.lat,p.lng]);
}
function closePanel(){document.getElementById('panel').classList.remove('open');document.body.classList.remove('panel-open');current=null;if(highlightId){highlightId=null;document.getElementById('map').classList.remove('searching');refreshVisible();}}
function updateFavStar(id){const fs=document.getElementById('favStar');const on=favorites.has(id);fs.classList.toggle('on',on);fs.textContent=on?'★':'☆';}

/* mostrar una de las 3 sub-pantallas del panel */
function showPane(t){   // 'info' | 'dishes' | 'add'
  document.getElementById('paneInfo').hidden=(t!=='info');
  document.getElementById('paneDishes').hidden=(t!=='dishes');
  document.getElementById('paneAdd').hidden=(t!=='add');
}

/* pantalla de información: info del sitio + estados (he ido / quiero ir) + acciones */
function renderInfo(id){
  const p=known.get(id);if(!p)return;
  renderScores(id);
  const rec=saved.get(id),n=rec?rec.dishes.length:0;
  const been=isVisited(id),wish=favorites.has(id);
  const em=p.ckey?cuisineEmoji(p.ckey):'🍴';
  const cLabel=p.ckey?(CUISINES.find(c=>c.key===p.ckey)||{}).label:'';
  let acts;
  if(n>0){
    acts=`<button class="bigbtn primary" id="actView">🍽️ Ver mis platos (${n})</button>`+
         `<button class="bigbtn" id="actAdd">➕ Añadir otro plato</button>`;
  }else{
    acts=`<button class="bigbtn primary" id="actAdd">➕ Añadir un plato</button>`+
         `<p class="info-hint">Aún no has guardado platos de este sitio.</p>`;
  }
  const ccChips=CUISINES.map(c=>`<button class="ccchip${p.ckey===c.key?' on':''}" data-k="${c.key}" style="--cc:${c.color}"><span>${c.em}</span>${c.label}</button>`).join('')+
    `<button class="ccchip${!p.ckey?' on':''}" data-k=""><span>🍴</span>Otro</button>`;
  document.getElementById('infoWrap').innerHTML=
    `<div class="info-card"><div class="info-emoji">${em}</div>`+
      `<div class="info-meta"><b>${esc(p.name)}</b>`+
      `<small>${esc((cLabel?cLabel+' · ':'')+(p.cat||'Restaurante'))}</small>`+
      `<small>📍 ${esc(p.addr||'Madrid')}</small></div></div>`+
    `<div class="info-status">`+
      `<button class="stbtn been${been?' on':''}" id="stBeen"><span>😋</span>${been?'Has ido aquí':'He ido'}</button>`+
      `<button class="stbtn want${wish?' on':''}" id="stWant"><span>⭐</span>${wish?'En "Quiero ir"':'Quiero ir'}</button>`+
    `</div>`+
    `<div class="info-actions">${acts}</div>`+
    `<div class="info-cuisine"><label>Tipo de cocina</label><div class="ccpick" id="ccPick">${ccChips}</div></div>`;
  document.getElementById('stBeen').onclick=()=>toggleBeen(id);
  document.getElementById('stWant').onclick=()=>toggleWant(id);
  document.querySelectorAll('#ccPick .ccchip').forEach(b=>b.onclick=()=>setCuisine(id,b.dataset.k||null));
  const av=document.getElementById('actView');if(av)av.onclick=()=>{renderDishes(id);showPane('dishes');};
  const aa=document.getElementById('actAdd');if(aa)aa.onclick=()=>{clearForm();showPane('add');};
}
/* asignar/quitar el tipo de cocina de un restaurante */
function setCuisine(id,key){
  const p=known.get(id);if(!p)return;
  p.ckey=key||null;
  if(key)ckeyOverrides[id]=key;else delete ckeyOverrides[id];
  saveCkeyOverrides();
  if(current===id)renderInfo(id);
  refreshVisible();
  toast(key?('Tipo: '+((CUISINES.find(c=>c.key===key)||{}).label||key)):'Tipo quitado');
}

/* estrella del panel = atajo de "Quiero ir" */
function toggleFav(){if(current)toggleWant(current);}
function toggleWant(id){
  if(favorites.has(id))favorites.delete(id);
  else{favorites.add(id);if(visited.has(id)){visited.delete(id);saveVisited();}}   // si lo quieres visitar, aún no has ido
  saveFavs();updateFavStar(id);
  if(current===id)renderInfo(id);
  refreshVisible();toast(favorites.has(id)?'Añadido a "Quiero ir" ⭐':'Quitado de "Quiero ir"');
}
function toggleBeen(id){
  if(hasDishes(id)){toast('Ya tienes platos guardados aquí 😋');return;}
  if(visited.has(id))visited.delete(id);
  else{visited.add(id);if(favorites.has(id)){favorites.delete(id);saveFavs();updateFavStar(id);}}   // si ya has ido, sale de "Quiero ir"
  saveVisited();
  if(current===id)renderInfo(id);
  refreshVisible();toast(visited.has(id)?'Marcado como visitado 😋':'Quitado de visitados');
}
function calcScores(id){
  const rec=saved.get(id),out={comida:null,postre:null,global:null,n:0};
  if(!rec||!rec.dishes.length)return out;
  const rated=rec.dishes.filter(d=>typeof d.rating==='number');
  out.n=rated.length;if(!rated.length)return out;
  const avg=a=>a.reduce((s,x)=>s+x,0)/a.length;
  const com=rated.filter(d=>d.course!=='postre').map(d=>d.rating);
  const pos=rated.filter(d=>d.course==='postre').map(d=>d.rating);
  if(com.length)out.comida=avg(com);
  if(pos.length)out.postre=avg(pos);
  if(out.comida!=null&&out.postre!=null)out.global=out.comida*0.7+out.postre*0.3;
  else out.global=out.comida!=null?out.comida:out.postre;
  return out;
}
function renderScores(id){
  const box=document.getElementById('pScores'),s=calcScores(id);
  if(s.global==null){box.className='scores empty-sc';box.innerHTML='';return;}
  box.className='scores';
  const cell=(cls,val,lbl)=>val==null?'':`<div class="sc ${cls}"><b>${val.toFixed(1)}</b><small>${lbl}</small></div>`;
  box.innerHTML=cell('global',s.global,'Global')+cell('',s.comida,'🍽️ Comida')+cell('',s.postre,'🍰 Postre');
}
// URLs temporales de las fotos/vídeos; se liberan al redibujar para no saturar la memoria en iOS
let reelURLs=[],viewerURLs=[];
function trackURL(arr,blob){const u=URL.createObjectURL(blob);arr.push(u);return u;}
// si la imagen/vídeo no carga (iOS a veces invalida la URL): reintenta desde el dato guardado y, si no, emoji
function attachMediaFallback(card,d){
  const m=card.querySelector('img,video');if(!m||!d.blob)return;
  m.addEventListener('error',()=>{
    if(!m.dataset.retried){m.dataset.retried='1';try{m.src=URL.createObjectURL(d.blob);}catch(e){}return;}
    card.classList.add('novid');m.remove();
    card.insertAdjacentHTML('afterbegin',`<div class="bigemoji">${d.course==='postre'?'🍰':'🍽️'}</div>`);
  });
}
function renderDishes(id){
  const reel=document.getElementById('dishReel'),rec=saved.get(id),dishes=rec?rec.dishes:[];
  renderScores(id);
  document.getElementById('fsBtn').classList.toggle('hide',!dishes.length);
  if(!dishes.length){
    reel.innerHTML=`<div class="reel-card novid"><div class="reel-emptybox"><div class="bigemoji">🍽️</div><p>Todavía no has añadido platos aquí.</p><button class="reel-addbtn" id="reelAdd">➕ Añadir tu primer plato</button></div></div>`;
    const ra=document.getElementById('reelAdd');if(ra)ra.onclick=()=>{clearForm();showPane('add');};
    return;
  }
  const total=dishes.length;
  reelURLs.forEach(u=>URL.revokeObjectURL(u));reelURLs=[];
  reel.innerHTML='';
  dishes.forEach((d,i)=>{
    const card=document.createElement('div');card.className='reel-card';let media='';
    if(d.blob){const url=trackURL(reelURLs,d.blob);
      media=d.mtype&&d.mtype.startsWith('video')
        ?`<video src="${url}" muted loop playsinline autoplay></video>`
        :`<img src="${url}"/>`;
    }else{card.classList.add('novid');media=`<div class="bigemoji">${d.course==='postre'?'🍰':'🍽️'}</div>`;}
    const score=typeof d.rating==='number'?`<span class="reel-score">${d.rating.toFixed(1)}/10</span>`:'';
    const tag=`<span class="reel-tag">${d.course==='postre'?'🍰 Postre':'🍽️ Comida'}</span>`;
    card.innerHTML=`${media}`+
      `<button class="reel-del" data-i="${i}" title="Eliminar">🗑</button>`+
      `<button class="reel-edit" data-i="${i}" title="Editar">✏️</button>`+
      `<div class="reel-top"><span class="reel-count">${i+1} / ${total}</span><h3>${esc(d.name)}</h3></div>`+
      `<div class="reel-bot"><div class="row1">${score}${tag}</div>${d.desc?`<p class="reel-desc">${esc(d.desc)}</p>`:''}</div>`;
    reel.appendChild(card);attachMediaFallback(card,d);
  });
  reel.querySelectorAll('.reel-del').forEach(b=>b.onclick=()=>deleteDish(id,+b.dataset.i));
  reel.querySelectorAll('.reel-edit').forEach(b=>b.onclick=()=>editDish(id,+b.dataset.i));
  reel.scrollLeft=0;
}
let editIndex=null,editMedia=null;   // edición de un plato existente (índice + foto/vídeo actual)
function clearForm(){
  editIndex=null;editMedia=null;
  document.getElementById('dName').value='';document.getElementById('dDesc').value='';pendingMedia=null;
  const dr=document.getElementById('drop');dr.classList.remove('has');
  dr.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v13"/></svg><span class="dt">Sube una foto<br>o vídeo del plato</span>`;
  document.getElementById('dRate').value=7;document.getElementById('rateVal').textContent='7.0';
  pendingCourse='comida';
  document.querySelectorAll('.segbtn').forEach(b=>b.classList.toggle('on',b.dataset.course==='comida'));
  document.getElementById('saveDish').textContent='Guardar plato';
  updateSaveBtn();
}
function updateSaveBtn(){document.getElementById('saveDish').disabled=document.getElementById('dName').value.trim().length===0;}
function setDropPreview(blob,mtype){
  const dr=document.getElementById('drop');
  if(!blob){dr.classList.remove('has');dr.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v13"/></svg><span class="dt">Sube una foto<br>o vídeo del plato</span>`;return;}
  const url=URL.createObjectURL(blob);
  const media=mtype&&mtype.startsWith('video')?`<video src="${url}" muted loop playsinline autoplay></video>`:`<img src="${url}"/>`;
  dr.classList.add('has');dr.innerHTML=`${media}<span class="redo">Cambiar</span>`;
}
/* editar un plato ya guardado (sin borrarlo): precarga el formulario */
function editDish(id,i){
  const rec=saved.get(id);if(!rec)return;const d=rec.dishes[i];if(!d)return;
  current=id;editIndex=i;pendingMedia=null;editMedia=d.blob?{blob:d.blob,type:d.mtype}:null;
  document.getElementById('dName').value=d.name||'';
  document.getElementById('dDesc').value=d.desc||'';
  const r=typeof d.rating==='number'?d.rating:7;
  document.getElementById('dRate').value=r;document.getElementById('rateVal').textContent=r.toFixed(1);
  pendingCourse=d.course==='postre'?'postre':'comida';
  document.querySelectorAll('.segbtn').forEach(b=>b.classList.toggle('on',b.dataset.course===pendingCourse));
  setDropPreview(d.blob,d.mtype);
  document.getElementById('saveDish').textContent='Guardar cambios';
  updateSaveBtn();showPane('add');
}
async function saveDish(){
  if(!current)return;const name=document.getElementById('dName').value.trim();if(!name)return;
  const desc=document.getElementById('dDesc').value.trim();
  const rating=parseFloat(document.getElementById('dRate').value);
  let rec=await DB.get(current);if(!rec)rec={id:current,meta:known.get(current),dishes:[]};
  const wasEdit=editIndex!=null&&rec.dishes[editIndex];
  if(wasEdit){
    const d=rec.dishes[editIndex];
    d.name=name;d.desc=desc;d.course=pendingCourse;d.rating=rating;
    if(pendingMedia){d.blob=pendingMedia.blob;d.mtype=pendingMedia.type;}         // foto/vídeo cambiado
    else if(editMedia){d.blob=editMedia.blob;d.mtype=editMedia.type;}             // se conserva el que había
    else{delete d.blob;delete d.mtype;}
  }else{
    const dish={name,desc,course:pendingCourse,rating,ts:Date.now()};if(pendingMedia){dish.blob=pendingMedia.blob;dish.mtype=pendingMedia.type;}
    rec.dishes.push(dish);
  }
  await DB.put(rec);saved.set(current,rec);
  renderDishes(current);refreshVisible();clearForm();showPane('dishes');toast(wasEdit?'Plato actualizado ✓':'Plato guardado ✓');
}
async function deleteDish(id,i){const rec=saved.get(id);if(!rec)return;rec.dishes.splice(i,1);await DB.put(rec);renderDishes(id);refreshVisible();toast('Plato eliminado');}

/* add place */
function toggleAddMode(){addMode=!addMode;document.getElementById('dAdd').classList.toggle('active',addMode);document.getElementById('modebar').classList.toggle('show',addMode);document.getElementById('map').style.cursor=addMode?'crosshair':'';}
function onMapClick(e){
  if(!addMode){
    if(highlightId){highlightId=null;document.getElementById('map').classList.remove('searching');refreshVisible();}
    return;
  }
  const name=prompt('Nombre del restaurante nuevo:');if(!name)return;
  const id='custom-'+Date.now()+'-'+Math.floor(e.latlng.lat*1e5);
  const p={id,name:name.trim(),cat:'Añadido por ti',addr:'Madrid',lat:e.latlng.lat,lng:e.latlng.lng,custom:true,ckey:null};
  known.set(id,p);PLACES.push(p);
  const rec={id,meta:p,dishes:[]};saved.set(id,rec);DB.put(rec);   // se guarda en el dispositivo al instante (aunque no tenga platos)
  visited.add(id);saveVisited();                                    // al añadirlo tú, cuenta como sitio al que has ido
  toggleAddMode();refreshVisible();openPanel(id);toast('Restaurante añadido ✓');
}

/* search suggestions */
let sugIndex=-1,sugItems=[];
function nameRank(name,term){   // -1=no coincide; 0=el nombre empieza por el término; n=la palabra nº empieza por él
  const n=norm(name);
  if(n.startsWith(term))return 0;
  const words=n.split(/[^a-z0-9]+/);
  for(let i=0;i<words.length;i++){ if(words[i]&&words[i].startsWith(term))return i+1; }
  return -1;
}
function onSearchInput(){
  const term=norm(document.getElementById('search').value);
  const box=document.getElementById('suggest');
  if(term.length<2){box.classList.remove('show');box.innerHTML='';sugItems=[];applyHint();return;}
  const c=map.getCenter();
  const res=PLACES.map(p=>({p,m:nameRank(p.name,term)}))
    .filter(o=>o.m>=0)                                  // solo coincidencias por principio de palabra
    .map(o=>({p:o.p,m:o.m,d:dist2(o.p,c)}))
    .sort((a,b)=> a.m-b.m || a.d-b.d)                   // mejor coincidencia primero; distancia solo desempata
    .slice(0,12);
  sugItems=res.map(r=>r.p);sugIndex=-1;
  if(!res.length){box.innerHTML=`<div class="row" style="cursor:default;color:var(--txt-dim)">Sin resultados</div>`;box.classList.add('show');applyHint();return;}
  box.innerHTML=res.map((r,i)=>{
    const km=Math.sqrt(r.d)*111;const kmTxt=km<1?Math.round(km*1000)+' m':km.toFixed(1)+' km';
    return `<div class="row" data-i="${i}"><span class="emoji">${r.p.ckey?cuisineEmoji(r.p.ckey):'🍴'}</span><div class="t"><b>${esc(r.p.name)}</b><small>${esc(r.p.addr||'Madrid')}</small></div><span class="km">${kmTxt}</span></div>`;
  }).join('');
  box.classList.add('show');applyHint();
  box.querySelectorAll('.row[data-i]').forEach(row=>row.onclick=()=>pickSuggest(+row.dataset.i));
}
function pickSuggest(i){
  const p=sugItems[i];if(!p)return;
  document.getElementById('suggest').classList.remove('show');
  document.getElementById('search').value=p.name;
  document.getElementById('search').blur();
  highlightId=p.id;
  document.getElementById('map').classList.add('searching');
  map.setView([p.lat,p.lng],17);refreshVisible();
  toast('📍 '+p.name+' · toca el punto para ver sus platos');
}
function onSearchKey(e){
  const box=document.getElementById('suggest');if(!box.classList.contains('show'))return;
  const rows=box.querySelectorAll('.row[data-i]');
  if(e.key==='ArrowDown'){e.preventDefault();sugIndex=Math.min(sugIndex+1,rows.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();sugIndex=Math.max(sugIndex-1,0);}
  else if(e.key==='Enter'){e.preventDefault();pickSuggest(sugIndex<0?0:sugIndex);return;}
  else if(e.key==='Escape'){box.classList.remove('show');applyHint();return;}
  rows.forEach((r,i)=>r.classList.toggle('on',i===sugIndex));
}

/* cuisine popover */
function buildCuisineChips(){
  const wrap=document.getElementById('cwrap');
  wrap.innerHTML=CUISINES.map(c=>`<div class="c" data-k="${c.key}" style="--cc:${c.color}"><span class="dot" style="background:${c.color}"></span><span class="em">${c.em}</span>${c.label}</div>`).join('');
  wrap.querySelectorAll('.c').forEach(el=>el.onclick=()=>selectCuisine(el.dataset.k));
}
function selectCuisine(key){
  activeCuisine=activeCuisine===key?null:key;
  document.querySelectorAll('#cwrap .c').forEach(el=>{
    const on=el.dataset.k===activeCuisine;
    el.classList.toggle('on',on);
    el.style.background=on?el.style.getPropertyValue('--cc'):'';
    el.style.borderColor=on?'transparent':'';
    el.style.color=on?'#fff':'';
  });
  document.getElementById('dCuisine').classList.toggle('active',!!activeCuisine);
  refreshVisible();
  if(activeCuisine){const c=CUISINES.find(c=>c.key===activeCuisine);toast(`Mostrando: ${c.label}`);}
}
function toggleCuisinePop(){document.getElementById('cuisines').classList.toggle('show');document.getElementById('mapModes').classList.remove('open');}

/* cambiar de "mapa": explorar / he comido / quiero ir */
function setMapMode(mode){
  if(!MODE_INFO[mode])return;
  mapMode=mode;
  const info=MODE_INFO[mode];
  const mc=document.getElementById('modeCurrent');
  document.getElementById('modeEm').textContent=info.em;
  mc.title=info.t+' · '+info.s;
  document.querySelectorAll('.mode-opt').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  document.getElementById('mapModes').classList.remove('open');
  refreshVisible();
  if(mode==='all')return;
  const set=PLACES.filter(mode==='eaten'?(p=>isVisited(p.id)):(p=>favorites.has(p.id)));
  if(!set.length){toast(mode==='eaten'?'Aún no has marcado ningún sitio como visitado 😋':'Tu lista "Quiero ir" está vacía ⭐');return;}
  const g=L.featureGroup(set.map(p=>L.marker([p.lat,p.lng])));
  map.fitBounds(g.getBounds().pad(.3),{maxZoom:16});
  const n=set.length;
  toast(mode==='eaten'?`${n} sitio${n>1?'s':''} probado${n>1?'s':''} 😋`:`${n} sitio${n>1?'s':''} por visitar ⭐`);
}

/* mis platos overlay */
let dishFeed=[];
function openDishesSheet(){
  const body=document.getElementById('sheetBody');
  document.getElementById('sheetTitle').textContent='Mis platos';
  dishFeed=[];
  saved.forEach(rec=>{if(rec.dishes.length){const p=known.get(rec.id)||rec.meta;rec.dishes.forEach(d=>dishFeed.push({p,d}));}});
  dishFeed.sort((a,b)=>(b.d.ts||0)-(a.d.ts||0));
  if(!dishFeed.length){body.innerHTML=`<div class="empty">Todavía no has subido ningún plato.<br>Abre un restaurante y añade tu primera foto 📸</div>`;}
  else{
    body.innerHTML='';
    dishFeed.forEach(({p,d},i)=>{
      const el=document.createElement('div');el.className='listitem';
      let thumb=`<div class="thumb">${d.mtype&&d.mtype.startsWith('video')?'🎬':'🍽️'}</div>`;
      if(d.blob){const url=URL.createObjectURL(d.blob);thumb=d.mtype&&d.mtype.startsWith('video')?`<video class="thumb" src="${url}" muted></video>`:`<img class="thumb" src="${url}"/>`;}
      el.innerHTML=`${thumb}<div class="t"><b>${esc(d.name)}</b><small>${esc(p?p.name:'—')}</small></div>`;
      el.onclick=()=>openViewer(dishFeed,i);
      body.appendChild(el);
    });
  }
  document.getElementById('overlay').classList.add('show');
}
function openRestViewer(){
  const rec=saved.get(current);if(!rec||!rec.dishes.length)return;
  const p=known.get(current)||rec.meta;
  const feed=rec.dishes.map(d=>({p,d}));
  const dr=document.getElementById('dishReel');
  const idx=dr.clientWidth?Math.round(dr.scrollLeft/dr.clientWidth):0;
  openViewer(feed,idx);
}
function openViewer(feed,start){
  dishFeed=feed;
  const reel=document.getElementById('viewerReel');viewerURLs.forEach(u=>URL.revokeObjectURL(u));viewerURLs=[];reel.innerHTML='';reel.style.overflowX='';
  feed.forEach(({p,d},i)=>{
    const card=document.createElement('div');card.className='reel-card';let media='';
    if(d.blob){const url=trackURL(viewerURLs,d.blob);
      media=d.mtype&&d.mtype.startsWith('video')
        ?`<video src="${url}" muted loop playsinline autoplay></video>`
        :`<img src="${url}"/>`;
    }else{card.classList.add('novid');media=`<div class="bigemoji">${d.course==='postre'?'🍰':'🍽️'}</div>`;}
    const score=typeof d.rating==='number'?`<span class="reel-score">${d.rating.toFixed(1)}/10</span>`:'';
    const tag=`<span class="reel-tag">${d.course==='postre'?'🍰 Postre':'🍽️ Comida'}</span>`;
    card.innerHTML=`${media}`+
      `<div class="reel-top">${p?`<span class="reel-count">🍴 ${esc(p.name)}</span>`:''}<h3>${esc(d.name)}</h3></div>`+
      `<div class="reel-bot"><div class="row1">${score}${tag}</div>${d.desc?`<p class="reel-desc">${esc(d.desc)}</p>`:''}${p?`<button class="reel-goto" data-idx="${i}">📍 Ver restaurante</button>`:''}</div>`;
    reel.appendChild(card);attachMediaFallback(card,d);
  });
  const v=document.getElementById('viewer');v.classList.add('show');
  reel.scrollLeft=start*reel.clientWidth;
  reel.querySelectorAll('.reel-goto').forEach(b=>b.onclick=()=>{const it=dishFeed[+b.dataset.idx];closeViewer();closeOverlay();if(it&&it.p){map.setView([it.p.lat,it.p.lng],17);openPanel(it.p.id);}});
}
function closeViewer(){document.getElementById('viewer').classList.remove('show');const r=document.getElementById('viewerReel');viewerURLs.forEach(u=>URL.revokeObjectURL(u));viewerURLs=[];r.innerHTML='';r.style.overflowX='';}
/* pinch-zoom + doble toque + arrastre sobre la foto del visor */
function applyT(img){img.style.transform=`translate(${img._x||0}px,${img._y||0}px) scale(${img._scale||1})`;}
function setupZoom(){
  const reel=document.getElementById('viewerReel');
  let gImg=null,gStart=1;
  reel.addEventListener('gesturestart',e=>{const img=e.target.closest('img');if(!img)return;e.preventDefault();gImg=img;gStart=img._scale||1;reel.style.overflowX='hidden';});
  reel.addEventListener('gesturechange',e=>{if(!gImg)return;e.preventDefault();gImg._scale=Math.max(1,Math.min(4,gStart*e.scale));applyT(gImg);});
  reel.addEventListener('gestureend',()=>{if(!gImg)return;if((gImg._scale||1)<=1.02){gImg._scale=1;gImg._x=0;gImg._y=0;applyT(gImg);reel.style.overflowX='';}gImg=null;});
  let panImg=null,px=0,py=0,ox=0,oy=0;
  reel.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;const img=e.target.closest('img');if(!img||(img._scale||1)<=1)return;panImg=img;px=e.touches[0].clientX;py=e.touches[0].clientY;ox=img._x||0;oy=img._y||0;},{passive:false});
  reel.addEventListener('touchmove',e=>{if(!panImg||e.touches.length!==1)return;e.preventDefault();panImg._x=ox+(e.touches[0].clientX-px);panImg._y=oy+(e.touches[0].clientY-py);applyT(panImg);},{passive:false});
  reel.addEventListener('touchend',()=>{panImg=null;});
  let lastTap=0;
  reel.addEventListener('touchend',e=>{const img=e.target.closest('img');if(!img)return;const now=Date.now();
    if(now-lastTap<300){if((img._scale||1)>1){img._scale=1;img._x=0;img._y=0;reel.style.overflowX='';}else{img._scale=2.5;reel.style.overflowX='hidden';}applyT(img);}
    lastTap=now;});
}
function closeOverlay(){document.getElementById('overlay').classList.remove('show');}

/* menú desplegable ☰ */
function menuAction(a){
  if(a==='places')openPlacesSheet();
  else if(a==='favs')setMapMode('wishlist');
  else if(a==='dishes')openDishesSheet();
  else if(a==='settings')openSettings();
}

/* mis sitios (restaurantes visitados) */
function openPlacesSheet(){
  const body=document.getElementById('sheetBody');
  document.getElementById('sheetTitle').textContent='Mis sitios';
  const rows=[];
  saved.forEach(rec=>{if(rec.dishes.length){const p=known.get(rec.id)||rec.meta;if(p)rows.push({p,rec,s:calcScores(rec.id)});}});
  if(!rows.length){body.innerHTML=`<div class="empty">Aún no has guardado ningún sitio.<br>Abre un restaurante y añade un plato 🍽️</div>`;}
  else{
    rows.sort((a,b)=>(b.s.global??-1)-(a.s.global??-1));
    body.innerHTML='';
    rows.forEach(({p,rec,s})=>{
      const el=document.createElement('div');el.className='listitem';
      const score=s.global!=null?s.global.toFixed(1):'—';
      const n=rec.dishes.length;
      el.innerHTML=`<div class="thumb bigscore">${score}</div><div class="t"><b>${esc(p.name)}</b><small>${n} plato${n>1?'s':''} · ${esc(p.cat||'Restaurante')}</small></div>`;
      el.onclick=()=>{map.setView([p.lat,p.lng],17);openPanel(p.id);closeOverlay();};
      body.appendChild(el);
    });
  }
  document.getElementById('overlay').classList.add('show');
}

/* ajustes / resumen */
function openSettings(){
  const body=document.getElementById('sheetBody');
  document.getElementById('sheetTitle').textContent='Ajustes';
  let sitios=0,platos=0,suma=0,cont=0;
  saved.forEach(rec=>{if(rec.dishes.length){sitios++;platos+=rec.dishes.length;const s=calcScores(rec.id);if(s.global!=null){suma+=s.global;cont++;}}});
  const media=cont?(suma/cont).toFixed(1):'—';
  body.innerHTML=
    `<div class="stat"><span>Sitios visitados</span><b>${sitios}</b></div>`+
    `<div class="stat"><span>Platos guardados</span><b>${platos}</b></div>`+
    `<div class="stat"><span>Favoritos</span><b>${favorites.size}</b></div>`+
    `<div class="stat"><span>Tu nota media global</span><b>${media}</b></div>`+
    `<div class="empty" style="margin:6px 0 4px">Tus fotos y notas se guardan solo en este dispositivo. Haz una copia de vez en cuando.</div>`+
    `<button class="save" id="btnExport">⬇️ Exportar copia de seguridad</button>`+
    `<button class="save" id="btnImport" style="margin-top:10px;background:#fff;color:var(--txt);border:1px solid var(--line)">⬆️ Importar copia</button>`;
  document.getElementById('btnExport').onclick=exportData;
  document.getElementById('btnImport').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('overlay').classList.add('show');
}

/* copia de seguridad: exportar / importar (incluye fotos y vídeos) */
function blobToDataURL(blob){return new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=()=>res(null);fr.readAsDataURL(blob);});}
async function exportData(){
  toast('Preparando copia…');
  const recs=await DB.all(),places=[];
  for(const r of recs){
    const dishes=[];
    for(const d of r.dishes){
      const o={name:d.name,desc:d.desc,course:d.course,rating:d.rating,ts:d.ts,mtype:d.mtype};
      if(d.blob)o.media=await blobToDataURL(d.blob);
      dishes.push(o);
    }
    places.push({id:r.id,meta:r.meta,dishes});
  }
  const data={app:'saboreo',version:1,exported:Date.now(),favorites:[...favorites],visited:[...visited],ckeys:ckeyOverrides,places};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='saboreo-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
  toast('Copia exportada ✓');
}
async function importData(file){
  try{
    const data=JSON.parse(await file.text());
    if(!data||data.app!=='saboreo'||!Array.isArray(data.places))throw 0;
    for(const pl of data.places){
      const dishes=[];
      for(const d of pl.dishes){
        const dish={name:d.name,desc:d.desc,course:d.course,rating:d.rating,ts:d.ts,mtype:d.mtype};
        if(d.media){try{dish.blob=await (await fetch(d.media)).blob();}catch(e){}}
        dishes.push(dish);
      }
      const rec={id:pl.id,meta:pl.meta,dishes};
      await DB.put(rec);saved.set(pl.id,rec);
      if(pl.meta&&!known.has(pl.id)){const p={...pl.meta,ckey:pl.meta.ckey||cuisineKey(pl.meta.cat)};known.set(pl.id,p);PLACES.push(p);}
    }
    if(Array.isArray(data.favorites)){data.favorites.forEach(f=>favorites.add(f));saveFavs();}
    if(Array.isArray(data.visited)){data.visited.forEach(v=>visited.add(v));saveVisited();}
    if(data.ckeys&&typeof data.ckeys==='object'){Object.assign(ckeyOverrides,data.ckeys);saveCkeyOverrides();applyCkeyOverrides();}
    refreshVisible();closeOverlay();toast('Copia importada ✓');
  }catch(e){toast('Archivo no válido');}
}

/* cerca de mí */
function nearMe(){
  if(!navigator.geolocation){toast('Geolocalización no disponible');return;}
  toast('Buscando tu ubicación…');
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    map.setView([lat,lng],16);
    if(youMarker)map.removeLayer(youMarker);
    youMarker=L.circleMarker([lat,lng],{radius:8,color:'#fff',weight:3,fillColor:'#33b7ff',fillOpacity:1}).addTo(map);
    toast('📍 Estás aquí');
  },()=>toast('No se pudo obtener tu ubicación'));
}

/* helpers */
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toastTimer;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

/* events */
function wire(){
  document.getElementById('closePanel').onclick=closePanel;
  document.getElementById('favStar').onclick=toggleFav;
  document.getElementById('dName').oninput=updateSaveBtn;
  document.getElementById('saveDish').onclick=saveDish;
  const s=document.getElementById('search');
  s.addEventListener('input',onSearchInput);s.addEventListener('keydown',onSearchKey);
  document.addEventListener('click',e=>{if(!e.target.closest('.search')){document.getElementById('suggest').classList.remove('show');applyHint();}});
  const drop=document.getElementById('drop'),file=document.getElementById('file');
  drop.onclick=()=>file.click();
  file.onchange=()=>{const f=file.files[0];if(!f)return;pendingMedia={blob:f,type:f.type};
    const url=URL.createObjectURL(f);
    const media=f.type.startsWith('video')?`<video src="${url}" muted loop playsinline autoplay></video>`:`<img src="${url}"/>`;
    drop.classList.add('has');drop.innerHTML=`${media}<span class="redo">Cambiar</span>`;};
  document.querySelectorAll('.segbtn').forEach(b=>b.onclick=()=>{pendingCourse=b.dataset.course;document.querySelectorAll('.segbtn').forEach(x=>x.classList.toggle('on',x===b));});
  document.getElementById('dRate').oninput=e=>document.getElementById('rateVal').textContent=parseFloat(e.target.value).toFixed(1);
  document.getElementById('dCuisine').onclick=toggleCuisinePop;
  document.getElementById('clearCuisine').onclick=()=>{activeCuisine=null;document.querySelectorAll('#cwrap .c').forEach(el=>{el.classList.remove('on');el.style.background='';el.style.borderColor='';el.style.color='';});document.getElementById('dCuisine').classList.remove('active');document.getElementById('cuisines').classList.remove('show');refreshVisible();};
  document.getElementById('dNear').onclick=nearMe;
  document.getElementById('dAdd').onclick=toggleAddMode;
  const mm=document.getElementById('mapModes');
  document.getElementById('modeCurrent').onclick=e=>{e.stopPropagation();mm.classList.toggle('open');document.getElementById('cuisines').classList.remove('show');};
  document.querySelectorAll('.mode-opt').forEach(b=>b.onclick=()=>setMapMode(b.dataset.mode));
  document.addEventListener('click',e=>{if(!e.target.closest('#mapModes'))mm.classList.remove('open');});
  const menuPop=document.getElementById('menuPop');
  document.getElementById('menuBtn').onclick=e=>{e.stopPropagation();menuPop.classList.toggle('show');};
  menuPop.querySelectorAll('button').forEach(b=>b.onclick=()=>{menuPop.classList.remove('show');menuAction(b.dataset.act);});
  document.addEventListener('click',e=>{if(!e.target.closest('#menuPop')&&e.target.id!=='menuBtn')menuPop.classList.remove('show');});
  document.getElementById('closeSheet').onclick=closeOverlay;
  document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeOverlay();};
  document.getElementById('importFile').onchange=e=>{const f=e.target.files[0];if(f)importData(f);e.target.value='';};
  document.getElementById('reelBack').onclick=()=>{if(current)renderInfo(current);showPane('info');};
  document.getElementById('addBack').onclick=()=>{if(current){renderInfo(current);renderDishes(current);}showPane(hasDishes(current)?'dishes':'info');};
  document.getElementById('viewerClose').onclick=closeViewer;
  document.getElementById('fsBtn').onclick=openRestViewer;
  setupZoom();
}

async function boot(){
  initMap();wire();buildCuisineChips();buildPlaces();
  await DB.open();
  const stored=await DB.all();
  stored.forEach(r=>{saved.set(r.id,r);if(r.meta&&!known.has(r.id)){const p={...r.meta,ckey:r.meta.ckey||cuisineKey(r.meta.cat)};known.set(r.id,p);PLACES.push(p);}});
  applyCkeyOverrides();
  refreshVisible();
  const l=document.getElementById('loader');
  document.getElementById('loaderTxt').textContent=`${PLACES.length.toLocaleString('es')} restaurantes listos`;
  setTimeout(()=>l.classList.add('hide'),700);
}
boot();
